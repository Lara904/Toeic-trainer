<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#f1f5f9"/>
  <rect x="0" y="220" width="400" height="60" fill="#cfd8dc"/>
  <!-- photocopieuse -->
  <rect x="110" y="100" width="140" height="130" rx="8" fill="#455a64"/>
  <rect x="118" y="108" width="124" height="75" rx="4" fill="#37474f"/>
  <!-- écran -->
  <rect x="128" y="115" width="60" height="35" rx="3" fill="#00acc1"/>
  <!-- boutons -->
  <circle cx="208" cy="122" r="5" fill="#66bb6a"/>
  <circle cx="208" cy="138" r="5" fill="#ef5350"/>
  <!-- plateau de sortie -->
  <rect x="248" y="175" width="50" height="6" rx="2" fill="#b0bec5"/>
  <!-- feuilles qui sortent -->
  <rect x="252" y="162" width="40" height="3" fill="#fff" stroke="#b0bec5" stroke-width="0.5"/>
  <rect x="250" y="167" width="40" height="3" fill="#fff" stroke="#b0bec5" stroke-width="0.5"/>
  <rect x="248" y="172" width="40" height="3" fill="#fff" stroke="#b0bec5" stroke-width="0.5"/>
  <!-- homme à droite -->
  <circle cx="320" cy="108" r="22" fill="#ffb74d"/>
  <ellipse cx="320" cy="88" rx="22" ry="11" fill="#4e342e"/>
  <rect x="300" y="130" width="40" height="55" rx="8" fill="#1a237e"/>
  <!-- bras gauche tendu vers les feuilles -->
  <line x1="300" y1="145" x2="268" y2="168" stroke="#ffb74d" stroke-width="9" stroke-linecap="round"/>
  <circle cx="266" cy="170" r="7" fill="#ffb74d"/>
  <!-- bras droit -->
  <line x1="340" y1="145" x2="358" y2="160" stroke="#ffb74d" stroke-width="9" stroke-linecap="round"/>
</svg>
