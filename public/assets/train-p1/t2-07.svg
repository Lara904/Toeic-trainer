  <!-- machine industrielle -->
  <rect x="50" y="90" width="190" height="160" rx="8" fill="#455a64"/>
  <!-- panneau avant -->
  <rect x="65" y="105" width="90" height="70" rx="4" fill="#37474f"/>
  <!-- voyants -->
  <circle cx="80"  cy="120" r="6" fill="#66bb6a"/>
  <circle cx="80"  cy="140" r="6" fill="#ef5350"/>
  <circle cx="80"  cy="160" r="6" fill="#f9a825"/>
  <!-- écran -->
  <rect x="100" y="112" width="48" height="38" rx="3" fill="#00acc1"/>
