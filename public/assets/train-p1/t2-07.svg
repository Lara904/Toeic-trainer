  <rect x="290" y="129" width="40" height="65" rx="8" fill="#1565c0"/>
  <rect x="270" y="143" width="20" height="40" rx="7" fill="#1565c0"/>
  <rect x="330" y="143" width="20" height="40" rx="7" fill="#1565c0"/>
  <!-- outil (clé) dans la main gauche -->
  <line x1="270" y1="152" x2="248" y2="145" stroke="#ffb74d" stroke-width="9" stroke-linecap="round"/>
  <rect x="228" y="138" width="24" height="10" rx="4" fill="#78909c"/>
  <!-- bras droit vers machine -->
  <line x1="290" y1="148" x2="268" y2="150" stroke="#ffb74d" stroke-width="9" stroke-linecap="round"/>
</svg>
