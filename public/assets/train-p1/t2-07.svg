  <circle cx="170" cy="145" r="30" fill="#263238"/>
  <circle cx="170" cy="145" r="20" fill="#37474f"/>
  <circle cx="170" cy="145" r="8"  fill="#546e7a"/>
  <!-- technicien -->
  <circle cx="310" cy="105" r="24" fill="#ffb74d"/>
