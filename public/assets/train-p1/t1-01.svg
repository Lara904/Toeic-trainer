<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <!-- fond -->
  <rect width="400" height="280" fill="#f0f9ff"/>
  <!-- mur -->
  <rect x="0" y="0" width="400" height="200" fill="#e8eef7"/>
  <!-- tableau blanc sur le mur -->
  <rect x="30" y="20" width="220" height="140" rx="4" fill="#fff" stroke="#b0bec5" stroke-width="3"/>
  <line x1="50" y1="70" x2="230" y2="70" stroke="#1565c0" stroke-width="3"/>
  <line x1="50" y1="95" x2="200" y2="95" stroke="#1565c0" stroke-width="2"/>
  <line x1="50" y1="115" x2="185" y2="115" stroke="#1565c0" stroke-width="2"/>
  <!-- sol -->
  <rect x="0" y="200" width="400" height="80" fill="#cfd8dc"/>
  <!-- femme debout à droite du tableau -->
  <!-- jambes -->
  <rect x="298" y="170" width="14" height="42" rx="4" fill="#1a237e"/>
  <rect x="316" y="170" width="14" height="42" rx="4" fill="#1a237e"/>
  <!-- corps -->
  <rect x="290" y="110" width="48" height="65" rx="8" fill="#e53935"/>
  <!-- bras gauche levé vers tableau -->
  <line x1="290" y1="125" x2="248" y2="100" stroke="#ffcc80" stroke-width="10" stroke-linecap="round"/>
  <!-- main + marqueur -->
  <circle cx="244" cy="98" r="6" fill="#ffcc80"/>
  <line x1="244" y1="98" x2="232" y2="94" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- bras droit -->
  <line x1="338" y1="125" x2="355" y2="148" stroke="#ffcc80" stroke-width="10" stroke-linecap="round"/>
  <!-- tête -->
  <circle cx="314" cy="92" r="22" fill="#ffcc80"/>
  <!-- cheveux -->
  <ellipse cx="314" cy="73" rx="22" ry="12" fill="#5d4037"/>
  <!-- trait de marqueur sur le tableau -->
  <line x1="245" y1="96" x2="218" y2="60" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
