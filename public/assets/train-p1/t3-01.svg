  <!-- bureau du médecin -->
  <rect x="30" y="165" width="340" height="16" rx="3" fill="#8d6e63"/>
  <rect x="50" y="181" width="12" height="38" fill="#6d4c41"/>
  <rect x="338" y="181" width="12" height="38" fill="#6d4c41"/>
