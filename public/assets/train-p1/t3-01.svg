  <rect x="180" y="125" width="80" height="42" rx="4" fill="#263238"/>
  <rect x="186" y="130" width="68" height="30" fill="#0097a7"/>
  <rect x="200" y="167" width="40" height="6" rx="2" fill="#37474f"/>
  <!-- médecin (blouse blanche) à gauche -->
