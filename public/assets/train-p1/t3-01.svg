  <ellipse cx="100" cy="78"  rx="24" ry="12" fill="#4e342e"/>
  <!-- blouse blanche -->
  <rect x="78"  y="124" width="44" height="65" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="58"  y="138" width="20" height="40" rx="7" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="122" y="138" width="20" height="40" rx="7" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <!-- stéthoscope -->
  <path d="M100 124 Q90 145 80 150" stroke="#37474f" stroke-width="3" fill="none"/>
  <circle cx="78" cy="152" r="6" fill="#37474f"/>
  <!-- patient assis (à droite) -->
  <circle cx="295" cy="100" r="24" fill="#ffcc80"/>
  <ellipse cx="295" cy="78"  rx="24" ry="12" fill="#1565c0"/>
  <rect x="275" y="124" width="40" height="55" rx="8" fill="#1565c0"/>
  <!-- jambes assis -->
  <rect x="275" y="165" width="18" height="16" rx="4" fill="#283593"/>
  <rect x="297" y="165" width="18" height="16" rx="4" fill="#283593"/>
  <!-- chaise -->
  <rect x="266" y="180" width="58" height="8"  rx="3" fill="#8d6e63"/>
  <rect x="268" y="188" width="10" height="30" fill="#6d4c41"/>
  <rect x="312" y="188" width="10" height="30" fill="#6d4c41"/>
