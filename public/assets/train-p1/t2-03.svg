<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#fffde7"/>
  <rect x="0" y="235" width="400" height="45" fill="#d7ccc8"/>
  <!-- immeuble de bureau -->
  <rect x="100" y="20" width="200" height="215" fill="#eceff1" stroke="#b0bec5" stroke-width="2"/>
  <!-- fenêtres -->
  <rect x="120" y="40"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <rect x="180" y="40"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <rect x="240" y="40"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <rect x="120" y="90"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <rect x="180" y="90"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <rect x="240" y="90"  width="40" height="30" fill="#81d4fa" opacity="0.8"/>
  <!-- porte d'entrée -->
  <rect x="175" y="170" width="50" height="65" rx="4" fill="#42a5f5"/>
  <!-- livreur avec colis -->
  <circle cx="70" cy="142" r="22" fill="#a5d6a7"/>
  <ellipse cx="70" cy="122" rx="22" ry="11" fill="#2e7d32"/>
  <rect x="50" y="164" width="40" height="55" rx="8" fill="#388e3c"/>
  <!-- colis dans les bras -->
  <rect x="30" y="168" width="40" height="34" rx="3" fill="#f9a825"/>
  <line x1="30" y1="182" x2="70" y2="182" stroke="#e65100" stroke-width="1.5"/>
  <line x1="50" y1="168" x2="50" y2="202" stroke="#e65100" stroke-width="1.5"/>
  <!-- bras sous le colis -->
  <line x1="50" y1="176" x2="38" y2="178" stroke="#a5d6a7" stroke-width="9" stroke-linecap="round"/>
  <!-- pile de colis au sol -->
  <rect x="92" y="200" width="44" height="32" rx="3" fill="#795548"/>
  <rect x="92" y="172" width="44" height="30" rx="3" fill="#f9a825"/>
  <rect x="96" y="145" width="36" height="28" rx="3" fill="#1565c0"/>
</svg>
