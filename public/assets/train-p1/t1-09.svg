<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#e3f2fd"/>
  <rect x="0" y="240" width="400" height="40" fill="#bbdefb"/>
  <!-- grande fenêtre -->
  <rect x="60" y="20" width="200" height="190" rx="4" fill="#81d4fa" stroke="#90a4ae" stroke-width="3"/>
  <!-- croisillon -->
  <line x1="160" y1="20"  x2="160" y2="210" stroke="#90a4ae" stroke-width="2.5"/>
  <line x1="60"  y1="112" x2="260" y2="112" stroke="#90a4ae" stroke-width="2.5"/>
  <!-- paysage dans la fenêtre -->
  <rect x="63" y="155" width="194" height="52" fill="#a5d6a7"/>
  <rect x="63" y="113" width="194" height="42" fill="#81d4fa"/>
  <!-- homme de dos face à la fenêtre -->
  <!-- tête -->
  <circle cx="320" cy="105" r="24" fill="#ffb74d"/>
  <ellipse cx="320" cy="83" rx="24" ry="12" fill="#37474f"/>
  <!-- corps de dos -->
  <rect x="298" y="129" width="44" height="65" rx="8" fill="#263238"/>
  <!-- bras le long du corps -->
  <rect x="278" y="135" width="20" height="42" rx="7" fill="#263238"/>
  <rect x="342" y="135" width="20" height="42" rx="7" fill="#263238"/>
</svg>
